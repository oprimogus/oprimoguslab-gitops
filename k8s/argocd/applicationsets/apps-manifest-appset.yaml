apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-manifests
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/oprimogus/oprimoguslab-gitops.git
        revision: main
        files:
          - path: k8s/apps/manifests/*.yaml
  template:
    metadata:
      name: '{{name}}'
      namespace: '{{namespace}}'
    spec:
      project: apps
      source:
        repoURL: https://github.com/oprimogus/oprimoguslab-gitops.git
        targetRevision: main
        path: '{{path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
